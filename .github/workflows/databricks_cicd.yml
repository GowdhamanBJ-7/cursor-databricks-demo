name: Databricks CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: .
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run unit tests
        run: |
          pytest -q

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [test]
    runs-on: ubuntu-latest
    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
      DATABRICKS_JOB_NAME: ${{ secrets.DATABRICKS_JOB_NAME || 'nyc-taxi-medallion-etl' }}
      DATABRICKS_GIT_URL: ${{ secrets.DATABRICKS_GIT_URL || format('{0}/{1}.git', github.server_url, github.repository) }}
      DATABRICKS_GIT_PROVIDER: ${{ secrets.DATABRICKS_GIT_PROVIDER || 'gitHub' }}
      DATABRICKS_GIT_BRANCH: ${{ secrets.DATABRICKS_GIT_BRANCH || github.ref_name }}
      DATABRICKS_GIT_PYTHON_FILE: ${{ secrets.DATABRICKS_GIT_PYTHON_FILE || 'pipeline/etl_pipeline.py' }}
      PIPELINE_BRONZE_TABLE: ${{ secrets.PIPELINE_BRONZE_TABLE }}
      PIPELINE_SILVER_TABLE: ${{ secrets.PIPELINE_SILVER_TABLE }}
      PIPELINE_GOLD_TABLE: ${{ secrets.PIPELINE_GOLD_TABLE }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Create or update Databricks job
        run: |
          python deploy/create_job.py
      - name: Schedule Databricks job and trigger run
        run: |
          python deploy/schedule_job.py

