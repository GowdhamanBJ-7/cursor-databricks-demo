# This is a Databricks asset bundle definition for cursor-databricks-demo.
# The Databricks extension requires databricks.yml configuration file.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.

bundle:
  name: cursor-databricks-demo

resources:
  jobs:
    nyc_taxi_medallion_etl:
      name: nyc-taxi-medallion-etl
      max_concurrent_runs: 1
      performance_target: PERFORMANCE_OPTIMIZED
      schedule:
        quartz_cron_expression: "0 0 6 * * ?"
        timezone_id: "UTC"
      environments:
        - environment_key: default
          spec:
            client: "2"
      tasks:
        - task_key: bronze
          environment_key: default
          spark_python_task:
            python_file: "pipeline/etl_pipeline.py"
            parameters: ["--stages", "bronze"]
        - task_key: silver
          depends_on:
            - task_key: bronze
          environment_key: default
          spark_python_task:
            python_file: "pipeline/etl_pipeline.py"
            parameters: ["--stages", "silver"]
        - task_key: gold
          depends_on:
            - task_key: silver
          environment_key: default
          spark_python_task:
            python_file: "pipeline/etl_pipeline.py"
            parameters: ["--stages", "gold"]

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: ${env.DATABRICKS_HOST}

  prod:
    mode: production
    workspace:
      host: ${env.DATABRICKS_HOST}

